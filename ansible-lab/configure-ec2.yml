---
- name: Configure EC2 Instances
  hosts: web_servers
  become: yes
  gather_facts: yes

  vars:
    app_user: appuser
    app_directory: /opt/app
    repo_url: https://github.com/your-org/product-service.git

  tasks:
    - name: Create application user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /bin/bash

    - name: Install required packages
      dnf:
        name:
          - git
          - java-21-amazon-corretto
          - maven
        state: present

    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Clone application repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_directory }}/product-service"
        version: main
        force: yes

    - name: Set ownership of application files
      file:
        path: "{{ app_directory }}/product-service"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    - name: Build application
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ app_directory }}/product-service"
      become_user: "{{ app_user }}"

    - name: Create systemd service
      template:
        src: product-service.service.j2
        dest: /etc/systemd/system/product-service.service
      notify: restart product-service

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start service
      systemd:
        name: product-service
        enabled: yes
        state: started

  handlers:
    - name: restart product-service
      systemd:
        name: product-service
        state: restarted
        daemon_reload: yes