version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-network

  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLOUD_SQS_PRODUCT_EVENTS_ENABLED=true
      - CLOUD_SQS_PRODUCT_EVENTS_QUEUE_URL=https://sqs.eu-north-1.amazonaws.com/079390754506/cn-course-product-events
      - CLOUD_SQS_PRODUCT_EVENTS_REGION=eu-north-1
      - AWS_ACCESS_KEY_ID=ACCESS_KEY
      - AWS_SECRET_ACCESS_KEY=SECRET_KEY
    depends_on:
      - kafka
    networks:
      - microservices-network

  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_ENABLED=true
      - CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_QUEUE_URL=https://sqs.eu-north-1.amazonaws.com/079390754506/cn-course-product-events
      - CLOUD_SQS_PRODUCT_EVENTS_CONSUMER_REGION=eu-north-1
      - AWS_ACCESS_KEY_ID=ACCESS_KEY
      - AWS_SECRET_ACCESS_KEY=SECRET_KEY
    depends_on:
      - kafka
      - product-service
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge